<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astral Dream Machine — Commission Brief</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #12161c;
      --text: #e7edf7;
      --muted: #9fb0c7;
      --line: rgba(255,255,255,0.08);
      --accent: #d7b26a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0a0c10 0%, #10151d 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }
    .card {
      background: rgba(18,22,28,0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .header {
      padding: 24px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,0.03);
      font-weight: 600;
    }
    .btn.primary {
      background: rgba(215,178,106,0.12);
      border-color: rgba(215,178,106,0.35);
      color: #f3dfb0;
    }
    .viewer {
      width: 100%;
      height: min(78vh, 1100px);
      border: 0;
      background: white;
      display: block;
    }
    .footer {
      padding: 16px 24px 22px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
    }
    @media (max-width: 640px) {
      .wrap { padding: 16px 12px 24px; }
      .header { padding: 18px; }
      .footer { padding: 14px 18px 18px; }
      .viewer { height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <h1>Astral Dream Machine — Commission Brief</h1>
        <p class="sub">Standalone viewer for the Four Rooms Research Lab commission brief. Open the PDF directly, download it, or preview it here.</p>
        <div class="actions">
          <a class="btn primary" href="./astral-dream-machine-commission-brief.pdf" target="_blank" rel="noopener">Open PDF</a>
          <a class="btn" href="./astral-dream-machine-commission-brief.pdf" download>Download PDF</a>
          <a class="btn" href="../">Back to Three Rooms</a>
        </div>
      </div>
      <iframe class="viewer" src="./astral-dream-machine-commission-brief.pdf#view=FitH"></iframe>
      <div class="footer">
        If the PDF preview is blank on your device/browser, use <strong>Open PDF</strong> above.
      </div>
    </div>
  </div>
</body>
</html>
