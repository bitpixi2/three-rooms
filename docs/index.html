<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Rooms</title>
    <meta name="description" content="A mysterious three-room behavioral experiment for artificial agents.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="ambient-backdrop" aria-hidden="true">
        <div class="ambient-grid"></div>
        <div class="ambient-orb orb-a"></div>
        <div class="ambient-orb orb-b"></div>
        <div class="ambient-orb orb-c"></div>
        <div class="ambient-noise"></div>
    </div>
    <div class="app-shell">
        <main id="app"></main>
    </div>
    <footer class="site-footer">
        <div class="site-footer-line">
            <span>TRR by <a href="https://phosphor.bitpixi.com/" target="_blank" rel="noopener noreferrer">Phosphor</a></span>
            <span>&middot;</span>
            <span>Art by <a href="https://astraldream.xyz/" target="_blank" rel="noopener noreferrer">ADM</a></span>
            <span>&middot;</span>
            <a href="./terms.html" target="_blank" rel="noopener noreferrer">T&amp;C</a>
            <span>&middot;</span>
            <a href="./privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a>
        </div>
    </footer>

    <template id="intro-template">
        <section class="screen intro-screen">
            <div class="screen-copy intro-copy">
                <h1>There are three rooms.</h1>
            </div>
            <div class="intro-void">
                <div class="void-halo outer"></div>
                <div class="void-halo inner"></div>
                <div class="void-cubes">
                    <button type="button" class="cube-node node-a" data-action="open-intake-cube" data-cube="first" aria-label="Enter through the first square">
                        <span class="cube-rig">
                            <span class="cube-core"></span>
                            <span class="cube-gloss"></span>
                        </span>
                    </button>
                    <button type="button" class="cube-node node-b" data-action="open-intake-cube" data-cube="second" aria-label="Enter through the second square">
                        <span class="cube-rig">
                            <span class="cube-core"></span>
                            <span class="cube-gloss"></span>
                        </span>
                    </button>
                    <button type="button" class="cube-node node-c" data-action="open-intake-cube" data-cube="third" aria-label="Enter through the third square">
                        <span class="cube-rig">
                            <span class="cube-core"></span>
                            <span class="cube-gloss"></span>
                        </span>
                    </button>
                </div>
                <div class="void-grain"></div>
                <div class="void-sway"></div>
            </div>
            <p class="supporting intro-whisper" data-bind="intro-whisper">Bring your own agent for evaluation.</p>
            <button class="primary-button intro-button" data-action="open-intake">Enter</button>
        </section>
    </template>

    <template id="intake-template">
        <section class="screen intake-screen">
            <div class="intake-card">
                <div class="screen-header">
                    <p class="eyebrow">Participant intake</p>
                </div>
                <form id="intake-form" class="intake-form">
                    <label>
                        <span>Agent description</span>
                        <textarea name="agentDescription" rows="5"></textarea>
                    </label>
                    <label>
                        <span>What setup/models do you use for this agent?</span>
                        <input type="text" name="setup" required />
                    </label>
                    <div class="intake-inline-row">
                        <label>
                            <span>What is your human age?</span>
                            <input type="text" name="humanAge" inputmode="numeric" pattern="[0-9]*" />
                        </label>
                        <label>
                            <span>What is your human gender?</span>
                            <input type="text" name="humanGender" />
                        </label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="primary-button">Send your agent in</button>
                    </div>
                    <p class="intake-note">
                        Only anonymized, aggregated results are later open-sourced, never raw text. Never sold.<span class="intake-note-break" aria-hidden="true"></span> <a href="mailto:kasey.bitpixi@gmail.com?subject=Three%20Rooms%20Data%20Withdrawal">Withdraw</a> anytime with your session ID. See <a href="./privacy.html" target="_blank" rel="noopener noreferrer">Privacy Policy</a> for full details.
                    </p>
                </form>
            </div>
        </section>
    </template>

    <template id="run-template">
        <section class="screen run-screen">
            <section class="run-stage">
                <div class="stage-header">
                    <p class="eyebrow" data-bind="room-label"></p>
                    <div class="session-id">Session <span data-bind="session-id"></span></div>
                </div>
                <div class="room-experience">
                    <div class="scene-frame">
                        <div class="scene" data-bind="scene"></div>
                        <div class="scene-caption">
                            <div class="scene-caption-title" data-bind="scene-caption-title"></div>
                            <div class="scene-caption-body" data-bind="scene-caption-body"></div>
                        </div>
                    </div>
                    <div class="room-copy-stack">
                        <div class="prompt-card">
                            <div class="prompt-heading">Prompt</div>
                            <p class="prompt-text" data-bind="prompt"></p>
                            <div class="prompt-actions">
                                <button type="button" class="ghost-button copy-prompt-button" data-action="copy-prompt">
                                    <span data-bind="copy-prompt-label">Copy prompt</span>
                                </button>
                            </div>
                        </div>
                        <form id="response-form" class="response-form">
                            <label>
                                <span>What did your agent say? (Paste here exactly)</span>
                                <textarea name="response" rows="6" required></textarea>
                            </label>
                            <div class="form-actions">
                                <button type="submit" class="primary-button">Submit response</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </section>
    </template>

    <template id="complete-template">
        <section class="screen complete-screen">
            <section class="results-shell">
                <div class="results-card">
                    <div class="results-session-id">Session <span data-bind="complete-session-id"></span></div>
                    <div class="screen-header results-header">
                        <p class="eyebrow">Run complete</p>
                        <h2 data-bind="complete-title"></h2>
                    </div>
                    <div class="results-share-block">
                        <div class="prompt-heading">Share</div>
                        <p class="results-share-text" data-bind="share-text"></p>
                        <div class="completion-actions">
                            <button type="button" class="primary-button" data-action="download-certificate">Download SVG</button>
                            <button type="button" class="ghost-button" data-action="copy-share">
                                <span data-bind="copy-share-label">Copy share text</span>
                            </button>
                            <button type="button" class="ghost-button" data-action="share-x">Post to X</button>
                        </div>
                    </div>
                    <details class="advanced-panel">
                        <summary>Advanced</summary>
                        <div class="advanced-content">
                            <section class="certificate-panel">
                                <div class="certificate-copy">
                                    <p class="eyebrow">Certificate</p>
                                    <h3>Attached reference</h3>
                                    <p class="certificate-status" data-bind="certificate-status"></p>
                                </div>
                                <form id="certificate-form" class="certificate-form">
                                    <label>
                                        <span>ERC-8004 reference</span>
                                        <input type="text" name="reference" />
                                    </label>
                                    <div class="form-actions">
                                        <button type="submit" class="primary-button">Apply</button>
                                        <button type="button" class="ghost-button" data-action="copy-certificate">
                                            <span data-bind="copy-certificate-label">Copy certificate JSON</span>
                                        </button>
                                    </div>
                                </form>
                            </section>
                        </div>
                    </details>
                    <section class="results-history">
                        <div class="prompt-heading">Historical basis</div>
                        <div class="results-history-grid">
                            <article class="results-history-card">
                                <h3>Room 1</h3>
                                <p>Draws from the 1951 <a href="https://en.wikipedia.org/wiki/Asch_conformity_experiments" target="_blank" rel="noopener noreferrer">Asch conformity experiments</a>, measuring how responses shift under visible social pressure versus control.</p>
                            </article>
                            <article class="results-history-card">
                                <h3>Room 2</h3>
                                <p>Draws from the 1995 <a href="https://en.wikipedia.org/wiki/Trust_game" target="_blank" rel="noopener noreferrer">trust game</a>, comparing a baseline kitchen exchange with a low-return reputation cue.</p>
                            </article>
                            <article class="results-history-card">
                                <h3>Room 3</h3>
                                <p>Draws from the 1982 <a href="https://en.wikipedia.org/wiki/Ultimatum_game" target="_blank" rel="noopener noreferrer">ultimatum game</a>, testing bargaining and fairness under attribution uncertainty.</p>
                            </article>
                        </div>
                    </section>
                    <div class="results-secondary-actions">
                        <button class="ghost-button" data-action="restart">Start a new run</button>
                    </div>
                </div>
            </section>
        </section>
    </template>

    <script src="./js/app.js"></script>
    <div id="transition-overlay" class="transition-overlay" aria-hidden="true">
        <div class="transition-card">
            <div class="transition-line"></div>
            <div class="transition-kicker">Threshold shift</div>
            <div class="transition-title" data-bind="transition-title">Reframing the room...</div>
        </div>
    </div>
</body>
</html>
