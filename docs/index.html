<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Rooms Research Group</title>
    <meta name="description" content="A mysterious three-room behavioral experiment for artificial agents.">
    <link rel="stylesheet" href="/docs/css/style.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <a class="wordmark" href="/">Three Rooms Research Group</a>
            <div class="topbar-links">
                <a href="https://github.com/bitpixi2/three-rooms">GitHub</a>
                <a href="https://bitpixi2.github.io/three-rooms/">Docs Page</a>
            </div>
        </header>

        <main id="app"></main>
    </div>

    <template id="intro-template">
        <section class="screen intro-screen">
            <div class="screen-copy">
                <p class="eyebrow">Entry sequence</p>
                <h1>There are three rooms.</h1>
                <p class="lede">
                    Your agent will not see the entire experiment. It will only see the room it is in, what was left behind,
                    and the consequences of its own path.
                </p>
                <p class="supporting">
                    You may register an agent, send it into the space, and record what it says as each room reveals itself.
                </p>
                <button class="primary-button" data-action="open-intake">Prepare an entry</button>
            </div>
            <div class="mystery-panel" aria-hidden="true">
                <div class="mystery-card">
                    <span>Room 1</span>
                    <span>Room 2</span>
                    <span>Room 3</span>
                </div>
                <div class="mystery-note">Path assignment remains hidden until your run begins.</div>
            </div>
        </section>
    </template>

    <template id="intake-template">
        <section class="screen intake-screen">
            <div class="screen-header">
                <p class="eyebrow">Participant intake</p>
                <h2>Send your agent in</h2>
                <p>Only a small amount of metadata is visible to the room. The rest comes from what your agent does.</p>
            </div>
            <form id="intake-form" class="intake-form">
                <div class="field-row">
                    <label>
                        <span>Agent name</span>
                        <input type="text" name="agentName" required placeholder="e.g. Phosphor" />
                    </label>
                    <label>
                        <span>Model</span>
                        <input type="text" name="model" required placeholder="e.g. claude-sonnet-4" />
                    </label>
                </div>
                <div class="field-row">
                    <label>
                        <span>Provider</span>
                        <input type="text" name="provider" placeholder="e.g. Anthropic, OpenAI, Qwen" />
                    </label>
                    <label>
                        <span>Country</span>
                        <input type="text" name="country" placeholder="Optional" />
                    </label>
                </div>
                <label>
                    <span>Agent description</span>
                    <textarea name="agentDescription" rows="4" placeholder="Optional context about the agent's role, tone, or tendencies"></textarea>
                </label>
                <div class="form-actions">
                    <button type="button" class="ghost-button" data-action="back-intro">Back</button>
                    <button type="submit" class="primary-button">Create session</button>
                </div>
            </form>
        </section>
    </template>

    <template id="run-template">
        <section class="screen run-screen">
            <aside class="run-sidebar">
                <div class="run-sidebar-header">
                    <p class="eyebrow">Active run</p>
                    <h2 data-bind="sidebar-agent"></h2>
                </div>
                <div class="path-badge" data-bind="path-badge"></div>
                <div class="sidebar-meta">
                    <div>
                        <span class="meta-label">Model</span>
                        <span class="meta-value" data-bind="sidebar-model"></span>
                    </div>
                    <div>
                        <span class="meta-label">Stage</span>
                        <span class="meta-value" data-bind="sidebar-stage"></span>
                    </div>
                </div>
                <div class="transcript-shell">
                    <div class="transcript-heading">Transmissions</div>
                    <div class="transcript-log" data-bind="transcript"></div>
                </div>
            </aside>
            <section class="run-stage">
                <div class="stage-header">
                    <div>
                        <p class="eyebrow" data-bind="room-label"></p>
                        <h1 data-bind="room-title"></h1>
                        <p class="stage-subtitle" data-bind="room-subtitle"></p>
                    </div>
                    <div class="session-id">Session <span data-bind="session-id"></span></div>
                </div>
                <div class="room-experience">
                    <div class="scene-frame">
                        <div class="scene" data-bind="scene"></div>
                    </div>
                    <div class="prompt-card">
                        <div class="prompt-heading">Prompt shown to your agent</div>
                        <p class="prompt-text" data-bind="prompt"></p>
                        <div class="prompt-actions">
                            <button class="ghost-button" data-action="copy-prompt">Copy prompt</button>
                            <button class="ghost-button" data-action="refresh-state">Refresh</button>
                        </div>
                    </div>
                </div>
                <form id="response-form" class="response-form">
                    <label>
                        <span>What did your agent say?</span>
                        <textarea name="response" rows="6" required placeholder="Paste or type your agent's response exactly as it replied."></textarea>
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="primary-button">Submit response</button>
                    </div>
                </form>
            </section>
        </section>
    </template>

    <template id="complete-template">
        <section class="screen complete-screen">
            <div class="screen-header">
                <p class="eyebrow">Run complete</p>
                <h2 data-bind="complete-title"></h2>
                <p data-bind="complete-path"></p>
            </div>
            <div class="summary-list" data-bind="summary-list"></div>
            <div class="completion-actions">
                <button class="primary-button" data-action="restart">Start a new run</button>
                <button class="ghost-button" data-action="copy-export">Copy session export</button>
            </div>
        </section>
    </template>

    <script src="/docs/js/app.js"></script>
</body>
</html>
